name: DAST Scan with OWASP ZAP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

permissions:
  issues: write
  contents: read

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Run DAST Scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # OWASP ZAP Action internally performs:
      # 1. Download ZAP
      # 2. Start Docker Container
      # 3. Spider (Crawling)
      # 4. Passive Scan
      # 5. Active Scan
      # 6. Generate Report

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'https://preview.owasp-juice.shop/'
          rules_file_name: 'rules.tsv'
          fail_action: true
          issue_title: 'DAST Vulnerabilities Found'
          cmd_options: >
            -config spider.maxDuration=3
            -config spider.maxDepth=5